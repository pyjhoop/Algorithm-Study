name: Organize LeetHub commits

# LeetHub가 저장소 루트에 "0088-merge-sorted-array" 같은 문제 폴더를 자동 커밋하면,
# 이 워크플로우가 해당 폴더를 src/leetCode/ 패키지 안으로 이동시킨다.

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  organize:
    # LeetHub가 만든 커밋일 때만 실행 (커밋 메시지에 "LeetHub" 포함)
    if: contains(github.event.head_commit.message, 'LeetHub')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move LeetHub problem folders into src/leetCode/
        run: |
          set -e
          shopt -s nullglob
          mkdir -p src/leetCode
          moved=0
          # LeetHub은 루트에 "0088-merge-sorted-array" 형식(숫자4자리-이름)의 폴더를 생성한다.
          for dir in [0-9][0-9][0-9][0-9]-*/; do
            [ -d "$dir" ] || continue
            name="${dir%/}"
            echo "Moving $name -> src/leetCode/$name"
            # 재제출 등으로 이미 존재하면 최신 풀이로 덮어쓴다.
            rm -rf "src/leetCode/$name"
            # git mv 대신 일반 mv 사용 (추적되지 않은 폴더/디렉터리 엣지케이스 회피)
            mv "$name" "src/leetCode/$name"
            moved=1
          done
          if [ "$moved" = "1" ]; then
            git add -A
          fi
          echo "moved=$moved" >> "$GITHUB_ENV"

      - name: Commit and push
        if: env.moved == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Organize LeetHub solutions into src/leetCode/ [skip ci]"
          git push
